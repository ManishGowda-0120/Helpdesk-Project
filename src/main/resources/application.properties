spring.application.name=helpdesk
server.port=${PORT:9090}

# ? Aiven MySQL - SSL required
spring.datasource.url=jdbc:mysql://${MYSQLHOST}:${MYSQLPORT}/${MYSQLDATABASE}?sslMode=REQUIRED&serverTimezone=UTC
spring.datasource.username=${MYSQLUSER}
spring.datasource.password=${MYSQLPASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.hikari.connection-timeout=20000
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect


# ? JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# ? Groq API
groq.api.key=${GROQ_API_KEY}

# ? Email
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=forprojectuse20@gmail.com
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true